<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path of AhlulBayt: The 14 Infallibles Timeline</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://www.al-islam.org; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="stylesheet" href="style.css">
    <link href="assets/fonts/fonts.css" rel="stylesheet">
</head>

<body>
    <div id="stars-container"></div>

    <header>
        <h1>Path of AhlulBayt</h1>
        <p class="subtitle">Timeline of the 14 Infallibles (AS)</p>
        <a href="index.html" class="back-btn">Back to Home</a>
    </header>

    <main class="timeline-main-wrapper">
        <section class="controls">
            <h2>Select Imams</h2>
            <div class="toggle-all-container">
                <button id="select-all-btn">Select All</button>
                <button id="deselect-all-btn">Deselect All</button>
            </div>
            <div id="imam-checkboxes" class="checkbox-grid"></div>

            <h2 class="section-separator red">Select Hypocrites</h2>
            <div id="villain-checkboxes" class="checkbox-grid"></div>

            <h2 class="section-separator">Filter Events</h2>
            <div id="event-filters" class="checkbox-grid"></div>
        </section>

        <section class="timeline-container">
            <div class="timeline-header">
                <div class="year-markers" id="year-markers"></div>
            </div>
            <div id="timeline-chart" class="timeline-chart"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Path of AhlulBayt. Educational Resource.</p>
    </footer>

    <div class="floating-controls">
        <div class="control-group">
            <label for="zoom-slider">Zoom</label>
            <input type="range" id="zoom-slider" min="0.1" max="4" step="0.1" value="1">
        </div>
        <button id="fit-view-btn">Fit View</button>
    </div>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-header">
                <h2 id="modal-title">Event Title</h2>
                <span id="modal-date" class="modal-date">Year 61 AH</span>
            </div>
            <div class="modal-body">
                <p id="modal-description">Event description goes here...</p>
                <div class="modal-source">
                    <strong>Source:</strong> <span id="modal-source-text">Kitab al-Irshad</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="timeline-drag.js"></script>
</body>

</html>
