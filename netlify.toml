[build]
  publish = "."

[headers]
  [[headers]]
  for = "/*"
  [headers.values]
  Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://www.al-islam.org; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
  Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  X-Frame-Options = "DENY"
  Permissions-Policy = "geolocation=(), microphone=()"
