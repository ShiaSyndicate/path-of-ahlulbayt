name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
      - name: Start static server
        run: npx serve . -l 3000 &
      - name: Install Playwright browsers
        run: npx playwright install
      - name: Install Playwright dependencies (Linux)
        run: sudo npx playwright install-deps || true

      - name: Run security grep scan
        run: npm run security:scan

      - name: Run ESLint (strict)
        run: npm run lint:ci

      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.js || true
      - name: NPM Audit (fail on high severity)
        run: npm audit --audit-level=high
